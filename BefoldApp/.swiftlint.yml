excluded:
  - .build
  - befold/Resources

cyclomatic_complexity:
  warning: 10
  error: 20

function_body_length:
  warning: 50
  error: 100

file_length:
  warning: 400
  error: 1000

type_body_length:
  warning: 250
  error: 350

line_length:
  warning: 120
  error: 200
  ignores_comments: true

# SwiftFormat の trailingCommas（末尾カンマ付与）と方向を揃える
trailing_comma:
  mandatory_comma: true

identifier_name:
  excluded:
    - fd  # ファイルディスクリプタの慣用名

# モデル型のネスト（GitHubRelease.Asset など）を許容する
nesting:
  type_level: 2
