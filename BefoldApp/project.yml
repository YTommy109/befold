name: befold
options:
  bundleIdPrefix: com.degino
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.5"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
schemes:
  befold:
    build:
      targets:
        befold: all
    run:
      config: Debug
    test:
      config: Debug
      coverageEnabled: false
      targets:
        - befoldTests
  befold-cli:
    build:
      targets:
        befold-cli: all
    run:
      config: Debug
targets:
  BefoldKit:
    type: framework
    platform: macOS
    sources:
      - path: BefoldKit
        excludes:
          - "Resources/**"
      - path: BefoldKit/Resources
        buildPhase: resources
        excludes:
          - "__tests__/**"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.degino.befold.kit
      PRODUCT_NAME: BefoldKit
      GENERATE_INFOPLIST_FILE: true
  BefoldRenderKit:
    type: framework
    platform: macOS
    sources:
      - path: BefoldRenderKit
    dependencies:
      - target: BefoldKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.degino.befold.renderkit
      PRODUCT_NAME: BefoldRenderKit
      GENERATE_INFOPLIST_FILE: true
  BefoldCLI:
    type: framework
    platform: macOS
    sources:
      - path: BefoldCLI
    dependencies:
      - target: BefoldKit
      - package: swift-argument-parser
        product: ArgumentParser
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.degino.befold.cli
      PRODUCT_NAME: BefoldCLI
      GENERATE_INFOPLIST_FILE: true
  befold:
    type: application
    platform: macOS
    sources:
      - path: befold
        excludes:
          - "Resources/**"
          - Info.plist
          - befold.entitlements
      - path: befold/Resources
        buildPhase: resources
        excludes:
          - "viewer.html"
          - "viewer.js"
          - "style.css"
          - "mermaid.min.js"
          - "markdown-it.min.js"
          - "highlight.min.js"
          - "dompurify.min.js"
          - "github.css"
          - "github-dark.css"
          - "github-markdown.css"
    dependencies:
      - target: BefoldKit
      - target: BefoldRenderKit
      - target: BefoldCLI
      # CLI 実行ファイルを Contents/MacOS へ同梱する。CLIInstaller が設置する
      # /usr/local/bin/befold の symlink 先がここになる (CLIInstaller.targetExecutablePath)。
      # link: false — アプリ本体にリンクするのではなく、成果物として持ち運ぶだけ。
      # codeSign: true — XcodeGen は executable の codeSignOnCopy を既定で無効にするため明示する
      #   (無効のままだと codesign --verify --deep が公証前に落ちる)。
      - target: befold-cli
        embed: true
        link: false
        codeSign: true
        copy:
          destination: executables
      - package: Sparkle
      - package: swift-argument-parser
        product: ArgumentParser
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.degino.befold
      PRODUCT_NAME: befold
      # BefoldCLI/AppVersion.swift の `AppVersion.current` と値を一致させる
      # (BefoldCLICommandTests.projectYmlMarketingVersionMatchesAppVersionConstant で照合)
      MARKETING_VERSION: "1.7.2"
      CURRENT_PROJECT_VERSION: "543"
      INFOPLIST_FILE: befold/Info.plist
      CODE_SIGN_ENTITLEMENTS: befold/befold.entitlements
      ENABLE_HARDENED_RUNTIME: true
      GENERATE_INFOPLIST_FILE: false
  befoldTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - befoldTests
    dependencies:
      - target: befold
      - target: BefoldKit
      - target: BefoldRenderKit
    settings:
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/befold.app/Contents/MacOS/befold"
      GENERATE_INFOPLIST_FILE: true
  befold-cli:
    type: tool
    platform: macOS
    sources:
      - path: befold-cli
    dependencies:
      - target: BefoldCLI
      - target: BefoldKit
      - package: swift-argument-parser
        product: ArgumentParser
    settings:
      PRODUCT_NAME: befold-cli
      # befold.app に同梱して配布するため、アプリ本体と同じく Hardened Runtime を有効にする
      # (無効な Mach-O が 1 つでも含まれると公証が通らない)。
      ENABLE_HARDENED_RUNTIME: true
