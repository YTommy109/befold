name: befold
options:
  bundleIdPrefix: com.degino
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.5"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
schemes:
  befold:
    build:
      targets:
        befold: all
    run:
      config: Debug
    test:
      config: Debug
      coverageEnabled: false
      targets:
        - befoldTests
targets:
  BefoldKit:
    type: framework
    platform: macOS
    sources:
      - path: BefoldKit
        excludes:
          - "Resources/**"
      - path: BefoldKit/Resources
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.degino.befold.kit
      PRODUCT_NAME: BefoldKit
      GENERATE_INFOPLIST_FILE: true
  befold:
    type: application
    platform: macOS
    sources:
      - path: befold
        excludes:
          - "Resources/**"
          - Info.plist
          - befold.entitlements
      - path: befold/Resources
        buildPhase: resources
        excludes:
          - "__tests__/**"
          - "viewer.html"
          - "viewer.js"
          - "style.css"
          - "mermaid.min.js"
          - "markdown-it.min.js"
          - "highlight.min.js"
          - "github.css"
          - "github-dark.css"
          - "github-markdown.css"
    dependencies:
      - target: BefoldKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.degino.befold
      PRODUCT_NAME: befold
      MARKETING_VERSION: "1.6.0"
      CURRENT_PROJECT_VERSION: "351"
      INFOPLIST_FILE: befold/Info.plist
      CODE_SIGN_ENTITLEMENTS: befold/befold.entitlements
      ENABLE_HARDENED_RUNTIME: true
      GENERATE_INFOPLIST_FILE: false
  befoldTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - befoldTests
    dependencies:
      - target: befold
      - target: BefoldKit
    settings:
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/befold.app/Contents/MacOS/befold"
      GENERATE_INFOPLIST_FILE: true
