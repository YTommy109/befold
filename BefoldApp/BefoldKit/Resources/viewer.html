<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!--
    信頼できない .md / .mmd を開くビューアのため、CSP で外部通信・リモート読み込みを遮断する。
    connect-src 'none' と img-src を自分自身+data: に限定することで、
    レンダリング経路（markdown-it の html:true 等）に XSS が混入しても
    fetch / beacon / 外部画像による情報流出を防ぐ。
    インライン <script> と onclick、mermaid が注入するインライン <style> のため
    script-src / style-src には 'unsafe-inline' を付与する。
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; frame-src blob:; connect-src 'none'; base-uri 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>befold</title>
  <!-- ベンダー CSS(github-markdown / github / github-dark)は style.css が
       @import layer(vendor) で取り込む。アプリ側スタイルは無レイヤーのため
       読み込み順や詳細度に関係なく常にベンダーより優先される -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="viewer">
    <div id="mmd-error" class="mmd-error-panel"></div>
    <div id="mmd-truncated-banner" class="mmd-truncated-banner" style="display:none;">
      <span id="mmd-truncated-text"></span>
      <button id="mmd-load-more-btn" style="display:none;"></button>
    </div>
    <div id="diagram-wrap"></div>
  </div>

  <!-- placeholder/title は _mmdInitFind() が window._mmdFindStrings(ローカライズ済み)で
       上書きする。未定義時のフォールバックとして日本語を静的に残す。 -->
  <div id="mmd-find-bar" class="mmd-find-bar">
    <div class="mmd-find-input-wrap">
      <input id="mmd-find-input" type="text" class="mmd-find-input" placeholder="検索">
      <div class="mmd-find-toggles">
        <button id="mmd-find-case" class="mmd-find-toggle" title="大文字・小文字を区別">Aa</button>
        <button id="mmd-find-word" class="mmd-find-toggle" title="単語単位で検索">ab|</button>
        <button id="mmd-find-regex" class="mmd-find-toggle" title="正規表現">.*</button>
      </div>
    </div>
    <span id="mmd-find-count" class="mmd-find-count"></span>
    <button id="mmd-find-prev" class="mmd-find-nav mmd-find-nav-prev" title="前へ (Shift+Enter)">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M1 6.5L5 2.5L9 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="mmd-find-next" class="mmd-find-nav mmd-find-nav-next" title="次へ (Enter)">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M1 3.5L5 7.5L9 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="mmd-find-close" class="mmd-find-close" title="閉じる (Esc)">&times;</button>
  </div>

  <script src="viewer.js"></script>
  <script src="mermaid.min.js"></script>
  <script src="markdown-it.min.js"></script>
  <script src="highlight.min.js"></script>
  <script>
  // Swift ブリッジメッセージ名（ViewerBridge.swift と同期）
  const _MSG_REFERENCE_ACTIVATED = 'referenceActivated';

  // --- Zoom ---
  var _mmdZoom = ZOOM_DEFAULT;
  // 直近で postMessage した倍率。init 時点の値で初期化し、実際に変化した時だけ通知する
  // （ページ初期化や render() のたびに UserDefaults へ書き込まれるのを防ぐ）。
  var _mmdLastPostedZoom = parseStoredZoom(window._mmdInitialZoom);

  function _mmdInitZoom() {
    _mmdZoom = parseStoredZoom(window._mmdInitialZoom);
    _mmdApplyZoom();
  }

  // Swift が注入したシステム本文フォントサイズを CSS 変数へ反映する。
  // 適用先は style.css の #diagram-wrap.markdown-body(Markdown 表示のみ)。
  function _mmdInitFontSize() {
    document.documentElement.style.setProperty(
      '--mmd-markdown-font-size',
      markdownFontSize(window._mmdSystemFontSize) + 'px'
    );
  }

  function _mmdApplyZoom() {
    _mmdZoom = clampZoom(_mmdZoom);
    var wrap = document.getElementById('diagram-wrap');
    if (wrap.classList.contains('pdf-body')) {
      // iframe 内の PDF プラグイン描画には CSS zoom が効かないため、
      // iframe(=wrap)の寸法自体を倍率で変える。PDF は幅フィットで
      // 描画されるので、幅が広がるほど拡大表示になる。
      wrap.style.zoom = 1;
      wrap.style.width = (effectiveZoom(_mmdZoom) * 100) + '%';
      wrap.style.height = (effectiveZoom(_mmdZoom) * 100) + '%';
    } else {
      wrap.style.width = '';
      wrap.style.height = '';
      wrap.style.zoom = effectiveZoom(_mmdZoom);
    }
    // 枠高さの上限は全体ズームに依存する（レイアウト px への割り戻し）ため再計算する。
    _mmdUpdateAllDiagramScrollHeights();
    if (_mmdZoom !== _mmdLastPostedZoom &&
        window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.zoomChanged) {
      window.webkit.messageHandlers.zoomChanged.postMessage(_mmdZoom);
      _mmdLastPostedZoom = _mmdZoom;
    }
  }

  function _mmdZoomIn() {
    _mmdZoom = stepZoom(_mmdZoom, ZOOM_STEP);
    _mmdApplyZoom();
  }

  function _mmdZoomOut() {
    _mmdZoom = stepZoom(_mmdZoom, -ZOOM_STEP);
    _mmdApplyZoom();
  }

  function _mmdZoomReset() {
    _mmdZoom = ZOOM_DEFAULT;
    _mmdApplyZoom();
  }

  function _mmdWheelZoom(deltaY) {
    _mmdZoom = wheelZoom(_mmdZoom, deltaY);
    _mmdApplyZoom();
  }

  // 実際にスクロールする要素は表示モードで異なる（style.css の .code-body 参照）。
  // ソースコード表示では #diagram-wrap.code-body pre code が、それ以外は .viewer 自体が
  // スクロールコンテナになるため、都度どちらが実体かを見て決める。
  function _mmdScrollTarget() {
    var codeEl = document.querySelector('#diagram-wrap.code-body pre code');
    if (codeEl) { return codeEl; }
    return document.querySelector('.viewer');
  }

  document.addEventListener('keydown', function(e) {
    // IME 変換中の Escape(候補キャンセル)では検索バーを閉じない。
    // Enter 側の変換確定判定(_mmdInitFind 付近の keydown ハンドラ)と同じ理由:
    // Safari/WKWebView は compositionend → keydown の順で発火するため isComposing は
    // 既に false になりうるが、keyCode は 229 のまま残るためこれも合わせて判定する。
    if (e.key === 'Escape' && _mmdFindIsOpen() && !e.isComposing && e.keyCode !== 229) {
      e.preventDefault();
      _mmdCloseFind();
      return;
    }
    document.body.classList.toggle('cmd-held', e.metaKey);
    if (e.metaKey) {
      if (e.key === '-') { e.preventDefault(); _mmdZoomOut(); }
      else if (e.key === '=' || e.key === '+') { e.preventDefault(); _mmdZoomIn(); }
      return;
    }
    var action = resolveScrollKey(e.key, e.shiftKey);
    if (!action) { return; }
    // 検索入力欄など編集可能要素にフォーカスがある間は、Space/矢印/vim jk を
    // 文字入力・カーソル移動としてそのまま素通りさせる(ビューアのスクロールに奪わない)。
    var active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) {
      return;
    }
    var scrollEl = _mmdScrollTarget();
    if (!scrollEl) { return; }
    e.preventDefault();
    var step;
    if (action.amount === 'page') {
      step = pageScrollStep(scrollEl.clientHeight);
    } else if (action.amount === 'half') {
      step = halfPageScrollStep(scrollEl.clientHeight);
    } else {
      step = lineScrollStep(getComputedStyle(scrollEl).lineHeight, DEFAULT_LINE_SCROLL_STEP);
    }
    scrollEl.scrollBy({ top: action.down ? step : -step, behavior: 'auto' });
  });

  document.addEventListener('keyup', function(e) {
    if (!e.metaKey) document.body.classList.remove('cmd-held');
  });
  // ウィンドウがフォーカスを失ったときも解除する
  window.addEventListener('blur', function() {
    document.body.classList.remove('cmd-held');
  });

  // --- リンク・パス参照クリック ---
  document.getElementById('diagram-wrap').addEventListener('click', function(e) {
    // XSS から postMessage を自動発火させる攻撃を防ぐため、
    // ユーザー起因のイベントのみ処理する。
    if (!e.isTrusted) return;

    var anchor = e.target.closest('a');
    var pathRef = e.target.closest('.befold-path-ref');
    var target = anchor || pathRef;
    if (!target) return;

    var href = anchor ? anchor.getAttribute('href') : pathRef.dataset.path;
    if (!href) return;

    // # で始まるアンカーリンクは JS 側で明示的にスクロールする
    // (decidePolicyFor が WKWebView のナビゲーションをキャンセルするため)
    if (href.charAt(0) === '#') {
      e.preventDefault();
      try { var id = decodeURIComponent(href.slice(1)); } catch (_) { var id = href.slice(1); }
      var el = document.getElementById(id) || document.querySelector('[name="' + CSS.escape(id) + '"]');
      if (el) el.scrollIntoView({ behavior: 'smooth' });
      return;
    }

    e.preventDefault();

    // <a> / .befold-path-ref とも同じ挙動: 無修飾=同一ウィンドウ, cmd=新規ウィンドウ
    window.webkit.messageHandlers[_MSG_REFERENCE_ACTIVATED].postMessage({
      href: href,
      newWindow: e.metaKey
    });
  });

  // コードブロック内のファイルパス検出用の正規表現。
  // 既知の制約: シンタックスハイライトによってトークンが複数の <span> に
  // 分割されている場合、その境界をまたぐパスは検出されない(シンプルな
  // ヒューリスティックとして許容する)。
  var _PATH_RE = /(?:(?<![/\w.])(?:\/?\.\.?\/[\w./-]+|[\w.-]+\/[\w./-]+)|(?:^|(?<=\s))\/[\w./-]+)(?:\.(?:swift|md|mmd|ts|tsx|js|jsx|py|rb|go|rs|java|kt|c|cpp|h|hpp|json|yaml|yml|toml|txt|html|css|sh))(?::\d+)*/g;

  // パス検出の対象にするタグ(このタグに入った時点で配下は許可状態になる)。
  // code はコードブロック(pre 配下)・インラインコードの両方を兼ねる。
  var _PATH_ANNOTATE_TAGS = ['p', 'li', 'td', 'th', 'blockquote', 'dt', 'dd', 'code'];

  function _annotatePathRefs() {
    var wrap = document.getElementById('diagram-wrap');
    if (wrap) { _walkTextNodes(wrap, false); }
  }

  // #diagram-wrap 配下を一度だけ再帰的に歩く。allowed は現在位置がパス検出の
  // 対象コンテキスト内(_PATH_ANNOTATE_TAGS 配下)かどうかを表し、対象タグに
  // 入った時点で true になり、非対象の子孫にもそのまま引き継がれる
  // (例: <p> 内の <strong> のテキストも検出対象)。単一パスの走査のため、
  // ネストしたタグ(li 内の li 等)を二重に処理する心配もない。
  function _walkTextNodes(node, allowed) {
    if (node.nodeType === 3) { // TEXT_NODE
      if (!allowed) return;
      var text = node.textContent;
      _PATH_RE.lastIndex = 0;
      var match = _PATH_RE.exec(text);
      if (!match) return;
      var frag = document.createDocumentFragment();
      var lastIndex = 0;
      do {
        if (match.index > lastIndex) {
          frag.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        }
        var span = document.createElement('span');
        span.className = 'befold-path-ref';
        span.dataset.path = match[0];
        span.textContent = match[0];
        frag.appendChild(span);
        lastIndex = _PATH_RE.lastIndex;
      } while ((match = _PATH_RE.exec(text)) !== null);
      if (lastIndex < text.length) {
        frag.appendChild(document.createTextNode(text.slice(lastIndex)));
      }
      node.parentNode.replaceChild(frag, node);
    } else if (node.nodeType === 1) {
      var tag = node.tagName.toLowerCase();
      // <a> 配下は既にリンクとして処理済み、svg/.mermaid は図中テキストの誤検出防止、
      // .befold-path-ref 配下は既存ガード(二重ラップ防止)。
      if (tag === 'a' || tag === 'svg' || node.classList.contains('mermaid') ||
          node.classList.contains('befold-path-ref')) {
        return;
      }
      var childAllowed;
      if (tag === 'pre') {
        // <pre> 直下のテキストは対象外(markdown-it の html:true により
        // <code> を伴わない生の <pre> がリスト項目内などに書かれた場合でも
        // 誤って対象化しないよう、祖先から引き継いだ allowed をリセットする)。
        // 内側の <code> は改めて自身で allowed = true にするため、
        // 従来の「pre code のみ対象」という範囲はそのまま維持される。
        childAllowed = false;
      } else {
        childAllowed = allowed || _PATH_ANNOTATE_TAGS.indexOf(tag) !== -1;
      }
      // スナップショットを取り順方向に走査(replaceChild で兄弟が変わるため)
      var children = Array.prototype.slice.call(node.childNodes);
      for (var j = 0; j < children.length; j++) {
        _walkTextNodes(children[j], childAllowed);
      }
    }
  }

  // Ctrl+ホイール（トラックパッドのピンチ含む）はポインタ位置で振り分ける:
  // ダイアグラム上ならそのダイアグラムの個別ズーム、それ以外は全体ズーム。
  document.addEventListener('wheel', function(e) {
    if (!e.ctrlKey) { return; }
    e.preventDefault();
    var wrap = e.target instanceof Element ? e.target.closest('.diagram-zoom-wrap') : null;
    if (wrap) {
      _mmdDiagramWheelZoom(wrap, e.deltaY);
    } else {
      _mmdWheelZoom(e.deltaY);
    }
  }, { passive: false });

  // --- Diagram Zoom（ダイアグラム個別ズーム）---
  // ブロック順インデックス → ズーム倍率。セッション内のみ保持し、再レンダリング
  // をまたいで維持する（永続化はしない。ウィンドウを閉じるとリセット）。
  // markdown 編集でブロックの順番が変わるとズームが別のダイアグラムに付くが、
  // 影響がセッション内に限られるため許容する（設計書参照）。
  var _diagramZooms = new Map();

  function _mmdDiagramZoomValue(index) {
    return _diagramZooms.has(index) ? _diagramZooms.get(index) : ZOOM_DEFAULT;
  }

  function _mmdUpdateAllDiagramScrollHeights() {
    document.querySelectorAll('.diagram-zoom-wrap').forEach(function(wrap) {
      _mmdUpdateDiagramScrollHeight(wrap);
    });
  }

  // 画像のフィットサイズ(px 実数値)を再計算して適用する。
  function _mmdFitImage(img, wrap) {
    var fit = imageFitSize(img.naturalWidth, img.naturalHeight, wrap.clientWidth, wrap.clientHeight);
    img.style.width = fit.width + 'px';
    img.style.height = fit.height + 'px';
  }

  // ウィンドウリサイズで枠高さの上限(ビューポート高)や画像のフィットサイズが
  // 変わるため追従させる。
  window.addEventListener('resize', function() {
    _mmdUpdateAllDiagramScrollHeights();
    var wrap = document.getElementById('diagram-wrap');
    var img = wrap.classList.contains('image-body') ? wrap.querySelector('img') : null;
    if (img && img.complete && img.naturalWidth) {
      _mmdFitImage(img, wrap);
    }
  });

  // 枠(.diagram-zoom-scroll)の高さをズーム倍率とウィンドウ高に追従させる。
  // 拡大時は枠がウィンドウ高まで伸び、収まらない分は枠内の縦スクロールで見る。
  function _mmdUpdateDiagramScrollHeight(wrap) {
    var zoom = _mmdDiagramZoomValue(Number(wrap.dataset.diagramIndex));
    var naturalHeight = Number(wrap.dataset.naturalHeight);
    wrap.querySelector('.diagram-zoom-scroll').style.height =
      diagramScrollHeight(naturalHeight, zoom, window.innerHeight, _mmdZoom) + 'px';
  }

  function _mmdApplyDiagramZoom(wrap) {
    var index = Number(wrap.dataset.diagramIndex);
    var zoom = _mmdDiagramZoomValue(index);
    wrap.querySelector('.diagram-zoom-inner').style.zoom = zoom * BASE_SCALE;
    _mmdUpdateDiagramScrollHeight(wrap);
    wrap.querySelector('.diagram-zoom-label').textContent = zoomLabel(zoom);
    wrap.querySelector('.diagram-zoom-in').disabled = zoom >= DIAGRAM_ZOOM_MAX;
    wrap.querySelector('.diagram-zoom-out').disabled = zoom <= ZOOM_MIN;
  }

  function _mmdDiagramZoomStep(wrap, delta) {
    var index = Number(wrap.dataset.diagramIndex);
    _diagramZooms.set(index, stepZoom(_mmdDiagramZoomValue(index), delta, DIAGRAM_ZOOM_MAX));
    _mmdApplyDiagramZoom(wrap);
  }

  function _mmdDiagramZoomReset(wrap) {
    _diagramZooms.set(Number(wrap.dataset.diagramIndex), ZOOM_DEFAULT);
    _mmdApplyDiagramZoom(wrap);
  }

  function _mmdDiagramWheelZoom(wrap, deltaY) {
    var index = Number(wrap.dataset.diagramIndex);
    _diagramZooms.set(index, wheelZoom(_mmdDiagramZoomValue(index), deltaY, DIAGRAM_ZOOM_MAX));
    _mmdApplyDiagramZoom(wrap);
  }

  // CSP により動的生成要素へ onclick 属性は使わず addEventListener で配線する。
  function _mmdBuildDiagramControls(wrap) {
    var controls = document.createElement('div');
    controls.className = 'diagram-zoom-controls';
    var zoomOut = document.createElement('button');
    zoomOut.className = 'diagram-zoom-out';
    zoomOut.title = '縮小';
    zoomOut.textContent = '−';
    zoomOut.addEventListener('click', function() { _mmdDiagramZoomStep(wrap, -ZOOM_STEP); });
    var label = document.createElement('span');
    label.className = 'diagram-zoom-label';
    label.title = 'クリックでリセット';
    label.addEventListener('click', function() { _mmdDiagramZoomReset(wrap); });
    var zoomIn = document.createElement('button');
    zoomIn.className = 'diagram-zoom-in';
    zoomIn.title = '拡大';
    zoomIn.textContent = '+';
    zoomIn.addEventListener('click', function() { _mmdDiagramZoomStep(wrap, ZOOM_STEP); });
    controls.appendChild(zoomOut);
    controls.appendChild(label);
    controls.appendChild(zoomIn);
    return controls;
  }

  // 各 .mermaid 要素をズーム用ラッパーで包む。SVG サイズ確定後
  // （mermaid.run() 完了後）に呼ぶこと。
  function _mmdWrapDiagrams(diagramWrap) {
    diagramWrap.querySelectorAll('.mermaid').forEach(function(el, i) {
      var wrap = document.createElement('div');
      wrap.className = 'diagram-zoom-wrap';
      wrap.dataset.diagramIndex = i;
      var scroll = document.createElement('div');
      scroll.className = 'diagram-zoom-scroll';
      var inner = document.createElement('div');
      inner.className = 'diagram-zoom-inner';
      el.parentNode.insertBefore(wrap, el);
      inner.appendChild(el);
      scroll.appendChild(inner);
      wrap.appendChild(scroll);
      wrap.appendChild(_mmdBuildDiagramControls(wrap));
      // 100% 時の自然高を記録し、枠高さの計算(_mmdUpdateDiagramScrollHeight)に使う。
      // この時点では inner にまだ zoom が適用されていないため素の実測値になる。
      wrap.dataset.naturalHeight = inner.offsetHeight;
      _mmdApplyDiagramZoom(wrap);
    });
  }

  // --- Mermaid ---
  var _currentType = 'mmd';
  var _mmdDarkQuery = window.matchMedia('(prefers-color-scheme: dark)');

  // theme 以外の設定は固定。カラースキームに応じて theme だけ差し替える。
  function _mmdMermaidConfig() {
    return {
      startOnLoad: false,
      theme: mermaidTheme(_mmdDarkQuery.matches),
      // 図ラベル内の生 HTML をサニタイズする（デフォルトだが将来の既定変更に備えて明示）
      securityLevel: 'strict',
      sequence:  { useMaxWidth: false },
      er:        { useMaxWidth: false },
      flowchart: { useMaxWidth: false },
      gantt:     { useMaxWidth: false },
      journey:   { useMaxWidth: false },
      pie:       { useMaxWidth: false },
      state:     { useMaxWidth: false },
      class:     { useMaxWidth: false },
    };
  }

  mermaid.initialize(_mmdMermaidConfig());

  // カラースキームが切り替わったら mermaid を再初期化し、直近の内容を再描画する。
  _mmdDarkQuery.addEventListener('change', function() {
    mermaid.initialize(_mmdMermaidConfig());
    if (_lastContent !== null) {
      render(_lastContent, _lastType, _lastLang);
    }
  });

  mermaid.parseError = function(err) {
    var msg = (err && (err.message || err.str)) || String(err);
    var panel = document.getElementById('mmd-error');
    panel.textContent = msg;
    panel.style.display = 'block';
    if (_currentType === 'mmd') {
      document.getElementById('diagram-wrap').style.display = 'none';
    }
  };

  // --- Markdown-it ---
  var md;
  if (typeof markdownit !== 'undefined') {
    md = markdownit({
      html: true,
      linkify: true,
      typographer: true,
      // highlight.min.js の読み込み失敗時は hljs 未定義 → highlightCode が '' を
      // 返し、ハイライトなしの従来表示に縮退する。
      highlight: function(str, lang) {
        return highlightCode(typeof hljs !== 'undefined' ? hljs : null, str, lang);
      },
    });
    // md.render() 出力からインラインイベントハンドラ(on*)を除去する後処理を追加。
    // html:true で .md 内の生 HTML を許可しているため、<img onerror=...> 等の
    // XSS ベクタを事前に無害化する。
    var _mdRenderOriginal = md.render.bind(md);
    md.render = function(src, env) {
      var html = _mdRenderOriginal(src, env);
      return html.replace(/<([a-z][a-z0-9]*)((?:\s+[a-z_-][\w.-]*(?:\s*=\s*(?:"[^"]*"|'[^']*'|[^\s"'>]*))?)*)\s*\/?>/gi,
        function(match, tag, attrs) {
          if (!attrs) return match;
          var cleaned = attrs.replace(/\s+on[a-z]+\s*=\s*(?:"[^"]*"|'[^']*'|[^\s"'>]*)/gi, '');
          if (cleaned === attrs) return match;
          return '<' + tag + cleaned + (match.charAt(match.length - 2) === '/' ? ' />' : '>');
        });
    };
    // fuzzyLink(scheme なしのドメイン風文字列の自動リンク化)を無効化する。
    // .md(モルドバ)や .sh(セントヘレナ)は実在の ccTLD のため、素のファイル名
    // (setup.md 等)が http:// の外部リンクに化けてブラウザが開いてしまう。
    // scheme 付き URL(https://...)の自動リンク化と [text](url) 形式は影響なし。
    md.linkify.set({ fuzzyLink: false });
    // 既定の validateLink は data:image/(gif|png|jpeg|webp) しか通さず、
    // MarkdownImageEmbedder が埋め込む svg+xml / bmp / x-icon の data URI が
    // 画像割れになる。data:image/* を全許可する判定へ差し替える。
    md.validateLink = isSafeLinkURL;
    var defaultFence = md.renderer.rules.fence;
    md.renderer.rules.fence = function(tokens, idx, options, env, self) {
      var token = tokens[idx];
      if (token.info.trim() === 'mermaid') {
        return '<pre class="mermaid">' + md.utils.escapeHtml(token.content) + '</pre>';
      }
      if (defaultFence) {
        return defaultFence(tokens, idx, options, env, self);
      }
      return '<pre><code>' + md.utils.escapeHtml(token.content) + '</code></pre>';
    };
  }

  // --- Find ---
  var _mmdFindOptions = { caseSensitive: false, wholeWord: false, useRegex: false };
  var _mmdFindQuery = '';
  var _mmdFindMatches = [];
  var _mmdFindCurrentIndex = -1;
  var _mmdFindIsOpenFlag = false;
  // 段階読み込み中(まだ全チャンクを読み終えていない)かどうか。_mmdSetTruncated が更新する。
  var _mmdIsTruncated = false;

  // ロード時に保存済みトグル状態(window._mmdInitialFindOptions、Swift から注入)と
  // ローカライズ済み文字列(window._mmdFindStrings、Swift から注入)を反映する。
  function _mmdInitFind() {
    var opts = window._mmdInitialFindOptions || {};
    _mmdFindOptions.caseSensitive = !!opts.caseSensitive;
    _mmdFindOptions.wholeWord = !!opts.wholeWord;
    _mmdFindOptions.useRegex = !!opts.useRegex;
    document.getElementById('mmd-find-case').classList.toggle('active', _mmdFindOptions.caseSensitive);
    document.getElementById('mmd-find-word').classList.toggle('active', _mmdFindOptions.wholeWord);
    document.getElementById('mmd-find-regex').classList.toggle('active', _mmdFindOptions.useRegex);

    var strings = window._mmdFindStrings || {};
    var input = document.getElementById('mmd-find-input');
    if (strings.placeholder) { input.placeholder = strings.placeholder; }
    if (strings.previous) { document.getElementById('mmd-find-prev').title = strings.previous; }
    if (strings.next) { document.getElementById('mmd-find-next').title = strings.next; }
    if (strings.matchCase) { document.getElementById('mmd-find-case').title = strings.matchCase; }
    if (strings.matchWholeWord) { document.getElementById('mmd-find-word').title = strings.matchWholeWord; }
    if (strings.useRegularExpression) {
      document.getElementById('mmd-find-regex').title = strings.useRegularExpression;
    }
    if (strings.close) { document.getElementById('mmd-find-close').title = strings.close; }
  }

  function _mmdFindIsOpen() {
    return _mmdFindIsOpenFlag;
  }

  function _mmdOpenFind() {
    _mmdFindIsOpenFlag = true;
    document.getElementById('mmd-find-bar').style.display = 'flex';
    var input = document.getElementById('mmd-find-input');
    input.value = _mmdFindQuery;
    input.focus();
    input.select();
    // 段階読み込み中(_mmdIsTruncated)でも未読み込み部分は検索対象にせず、
    // 表示済み DOM のみを検索する(件数表示は _mmdFindUpdateCount が「表示範囲内」を付与する)。
    _mmdFindRun();
  }

  function _mmdCloseFind() {
    _mmdFindIsOpenFlag = false;
    document.getElementById('mmd-find-bar').style.display = 'none';
    _mmdFindClearMarks();
    _mmdFindMatches = [];
    _mmdFindCurrentIndex = -1;
  }

  // ⌘G / ⌘Shift+G から呼ばれる。検索バーが閉じている間は何もしない
  // (フォーカス位置に関わらずグローバルショートカットとして配線されるため、
  // 呼び出し側では開閉判定をせずここで一元的にガードする)。
  function _mmdFindNextIfOpen() {
    if (!_mmdFindIsOpen()) return;
    _mmdFindNext();
  }

  function _mmdFindPrevIfOpen() {
    if (!_mmdFindIsOpen()) return;
    _mmdFindPrev();
  }

  // 前回検索でハイライトした <mark> を平文へ復元する(次の検索前に必ず呼ぶ)。
  // normalize() は親ごとに1回だけ呼ぶ(同じ親に複数の <mark> がある場合の重複呼び出しを避ける)。
  function _mmdFindClearMarks() {
    var marks = document.querySelectorAll('#diagram-wrap mark.mmd-find-match');
    var parents = new Set();
    marks.forEach(function(mark) {
      var text = document.createTextNode(mark.textContent);
      var parent = mark.parentNode;
      if (!parent) return;
      parent.replaceChild(text, mark);
      parents.add(parent);
    });
    parents.forEach(function(parent) { parent.normalize(); });
  }

  // 1つのテキストノード内のマッチをすべて <mark> に置換し、matches に追加する。
  // ゼロ幅マッチ(例: 正規表現 "a*" の空文字一致)は無限ループを避けるため読み飛ばす。
  function _mmdFindWalkText(node, regex, matches) {
    var text = node.textContent;
    regex.lastIndex = 0;
    var ranges = [];
    var match;
    while ((match = regex.exec(text)) !== null) {
      if (match[0].length === 0) {
        regex.lastIndex++;
        if (regex.lastIndex > text.length) break;
        continue;
      }
      ranges.push({ index: match.index, text: match[0] });
    }
    if (ranges.length === 0) return;
    var frag = document.createDocumentFragment();
    var lastIndex = 0;
    ranges.forEach(function(range) {
      if (range.index > lastIndex) {
        frag.appendChild(document.createTextNode(text.slice(lastIndex, range.index)));
      }
      var mark = document.createElement('mark');
      mark.className = 'mmd-find-match';
      mark.textContent = range.text;
      frag.appendChild(mark);
      matches.push(mark);
      lastIndex = range.index + range.text.length;
    });
    if (lastIndex < text.length) {
      frag.appendChild(document.createTextNode(text.slice(lastIndex)));
    }
    node.parentNode.replaceChild(frag, node);
  }

  // SVG(mermaid の描画結果)・STYLE・SCRIPT 配下は再帰しない: SVG 名前空間に HTML の
  // <mark> を挿入すると描画されず文字が消え、mermaid が注入する <style> の中身を
  // 誤ってラップすると図のスタイルも壊れるため。この結果、mermaid 図のラベル文字列
  // (SVG text)は検索対象外となるが、これは意図したスコープ境界であり見落としではない。
  //
  // 注意: DOM 仕様上 Element.tagName が ASCII 大文字化されるのは HTML 名前空間の要素の
  // みで、SVG 名前空間の要素(mermaid が描画する <svg>/<text>/<tspan> や注入する
  // <style> を含む)の tagName は大文字化されず小文字のまま返る(例: 'svg'、'style')。
  // このリストは大文字で保持しつつ、比較側で toUpperCase() して正規化する。
  var _mmdFindSkipTags = ['MARK', 'SVG', 'STYLE', 'SCRIPT'];

  // #diagram-wrap 配下のテキストノードを再帰的に歩き、マッチを <mark> に置換する。
  // 既知の制約: シンタックスハイライトの <span> 境界やパス参照 <span> の境界をまたぐ
  // 一致は検出しない(_PATH_RE の制約と同じ考え方)。
  function _mmdFindWalk(node, regex, matches) {
    if (node.nodeType === 3) {
      _mmdFindWalkText(node, regex, matches);
    } else if (node.nodeType === 1 && _mmdFindSkipTags.indexOf(node.tagName.toUpperCase()) === -1) {
      var children = Array.prototype.slice.call(node.childNodes);
      for (var i = 0; i < children.length; i++) {
        _mmdFindWalk(children[i], regex, matches);
      }
    }
  }

  // マッチなしを専用文言で表示すると文字幅の違いでバーが伸縮するため、
  // 常に「現在位置/件数」形式(マッチなし時は 0/0)のみを表示する。
  // 段階読み込み中(_mmdIsTruncated)は表示済み DOM だけが検索対象であることを示すため
  // 「表示範囲内」ラベルを付与する。
  function _mmdFindUpdateCount() {
    var countEl = document.getElementById('mmd-find-count');
    var input = document.getElementById('mmd-find-input');
    if (_mmdFindQuery.length === 0 || input.classList.contains('mmd-find-error')) {
      countEl.textContent = '';
    } else {
      var current = _mmdFindMatches.length === 0 ? 0 : _mmdFindCurrentIndex + 1;
      var text = current + '/' + _mmdFindMatches.length;
      if (_mmdIsTruncated) {
        var strings = window._mmdFindStrings || {};
        text += ' (' + (strings.withinDisplayedRange || 'Displayed range') + ')';
      }
      countEl.textContent = text;
    }
  }

  function _mmdFindHighlightCurrent() {
    _mmdFindMatches.forEach(function(mark) { mark.classList.remove('mmd-find-match-current'); });
    var current = _mmdFindMatches[_mmdFindCurrentIndex];
    if (!current) return;
    current.classList.add('mmd-find-match-current');
    current.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }

  // 入力・トグル変更のたびに呼ばれる: 現在のハイライトをクリアして再検索する。
  // suppressAutoHighlight を true にすると、1件目への自動ハイライト・スクロールを行わない
  // (呼び出し元が位置確定後に自分でハイライトする場合に使う。_mmdFindRefresh 参照)。
  function _mmdFindRun(suppressAutoHighlight) {
    var input = document.getElementById('mmd-find-input');
    _mmdFindQuery = input.value;
    _mmdFindClearMarks();
    _mmdFindMatches = [];
    _mmdFindCurrentIndex = -1;

    var regex = buildFindRegExp(_mmdFindQuery, _mmdFindOptions);
    input.classList.toggle('mmd-find-error', _mmdFindQuery.length > 0 && regex === null);

    if (regex) {
      _mmdFindWalk(document.getElementById('diagram-wrap'), regex, _mmdFindMatches);
    }

    if (_mmdFindMatches.length > 0) {
      _mmdFindCurrentIndex = 0;
      if (!suppressAutoHighlight) {
        _mmdFindHighlightCurrent();
      }
    }
    _mmdFindUpdateCount();
  }

  // render() / _renderSource() の末尾から呼ばれる: バーが開いていれば
  // 同じクエリ・トグルのまま新しい DOM に対して再検索する。
  // resetToFirst が真の場合は1件目に位置をリセットする(モード切替時: レンダリング結果と
  // ソースコードとで DOM 構造に連続性がないため、位置維持に意味がない)。
  // 省略時は可能な限り現在位置を維持する(ライブリロード追従)。
  // _mmdFindRun には suppressAutoHighlight=true を渡し、1件目への自動スクロールを抑止した上で、
  // 位置確定後にここで1回だけ _mmdFindHighlightCurrent() を呼ぶ(二重スクロール防止)。
  function _mmdFindRefresh(resetToFirst) {
    var previousIndex = resetToFirst ? 0 : _mmdFindCurrentIndex;
    _mmdFindRun(true);
    if (_mmdFindMatches.length > 0) {
      _mmdFindCurrentIndex = Math.min(Math.max(previousIndex, 0), _mmdFindMatches.length - 1);
      _mmdFindHighlightCurrent();
      _mmdFindUpdateCount();
    }
  }

  function _mmdFindNext() {
    if (_mmdFindMatches.length === 0) return;
    _mmdFindCurrentIndex = (_mmdFindCurrentIndex + 1) % _mmdFindMatches.length;
    _mmdFindHighlightCurrent();
    _mmdFindUpdateCount();
  }

  function _mmdFindPrev() {
    if (_mmdFindMatches.length === 0) return;
    _mmdFindCurrentIndex = (_mmdFindCurrentIndex - 1 + _mmdFindMatches.length) % _mmdFindMatches.length;
    _mmdFindHighlightCurrent();
    _mmdFindUpdateCount();
  }

  // トグルボタン共通のハンドラ: 状態を反転し、見た目を更新し、Swift へ永続化を依頼して再検索する。
  function _mmdFindToggleOption(optionName, buttonId) {
    _mmdFindOptions[optionName] = !_mmdFindOptions[optionName];
    document.getElementById(buttonId).classList.toggle('active', _mmdFindOptions[optionName]);
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.findOptionsChanged) {
      window.webkit.messageHandlers.findOptionsChanged.postMessage({
        caseSensitive: _mmdFindOptions.caseSensitive,
        wholeWord: _mmdFindOptions.wholeWord,
        useRegex: _mmdFindOptions.useRegex
      });
    }
    _mmdFindRun();
  }

  document.getElementById('mmd-find-input').addEventListener('input', function() { _mmdFindRun(); });
  document.getElementById('mmd-find-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      // Safari/WKWebView は compositionend → keydown の順で発火するため、
      // 変換確定の Enter では isComposing が既に false になっている。
      // ただし keyCode は 229 のまま残るため、これも合わせて判定する。
      if (e.isComposing || e.keyCode === 229) { return; }
      e.preventDefault();
      if (e.shiftKey) { _mmdFindPrev(); } else { _mmdFindNext(); }
    }
    // Escape はここでは処理しない: document の keydown ハンドラがバブリングで捕捉し、
    // _mmdFindIsOpen() 時に preventDefault + _mmdCloseFind() を行う(同じ挙動になる)。
  });
  document.getElementById('mmd-find-next').addEventListener('click', _mmdFindNext);
  document.getElementById('mmd-find-prev').addEventListener('click', _mmdFindPrev);
  document.getElementById('mmd-find-close').addEventListener('click', _mmdCloseFind);
  document.getElementById('mmd-find-case').addEventListener('click', function() {
    _mmdFindToggleOption('caseSensitive', 'mmd-find-case');
  });
  document.getElementById('mmd-find-word').addEventListener('click', function() {
    _mmdFindToggleOption('wholeWord', 'mmd-find-word');
  });
  document.getElementById('mmd-find-regex').addEventListener('click', function() {
    _mmdFindToggleOption('useRegex', 'mmd-find-regex');
  });

  // --- Render ---
  function _escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  // カラースキーム変更時に再描画するため、直近の内容を保持する。
  var _lastContent = null;
  var _lastType = null;
  var _lastLang = null;
  var _viewMode = 'rendered';
  // setViewMode() が直前と異なるモードを検知したら true になり、
  // render()/_renderSource() が検索リフレッシュ(先頭リセット)に使った後 false へ戻す。
  var _mmdModeJustSwitched = false;
  var _showLineNumbers = false;
  // 直前チャンクが改行で終わったか(強制分割の継続行判定用)。
  var _lastChunkEndedWithNewline = true;
  // appendChunk でのハイライトに与える前方文脈の行数。ブロックコメントや
  // 複数行文字列がチャンク境界をまたいでも hljs が字句状態を再構築できる
  // ようにするための固定サイズの先読み(詳細は codeChunkInnerHtml 参照)。
  var CODE_CHUNK_CONTEXT_LINES = 200;

  // Swift 側(ViewerWebView)が render() 呼び出しの直前に評価し、次の render() が
  // 復元すべきスクロール位置(scrollTop)を注入する。
  var _mmdPendingRestoreScroll = null;

  function _mmdSetRestoreScroll(position) {
    _mmdPendingRestoreScroll = position;
  }

  // スクロール位置の変化を Swift 側へ通知する(継続的な保存用、200ms デバウンス経由でのみ呼ばれる)。
  // ファイル/モード切替直前の退場側位置は、Swift 側(ViewerWindowController)が
  // 切替処理の中で明示的に旧 URL・旧モードのキーへ確定保存するため、ここでは扱わない。
  function _mmdPostScrollPosition() {
    var el = _mmdScrollTarget();
    if (!el) return;
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.scrollPositionChanged) {
      window.webkit.messageHandlers.scrollPositionChanged.postMessage({
        position: el.scrollTop,
        mode: _viewMode
      });
    }
  }

  // fallbackScrollTop は Swift 由来の pending 値が無いとき(カラースキーム変更時の
  // 内部再描画など、Swift を経由しない render() 呼び出し)に使う復元位置。
  // render() が DOM を書き換える直前の scrollTop を渡すことで、内部再描画では
  // 現在位置がそのまま保たれる。
  function _mmdRestoreScrollPosition(fallbackScrollTop) {
    var el = _mmdScrollTarget();
    if (!el) return;
    el.scrollTop = (_mmdPendingRestoreScroll !== null)
      ? _mmdPendingRestoreScroll
      : (typeof fallbackScrollTop === 'number' ? fallbackScrollTop : 0);
    _mmdPendingRestoreScroll = null;
  }

  // スクロールイベントを 200ms デバウンスして Swift 側へ通知する。
  // アプリ終了時やウィンドウ破棄時にも最新の位置が保存されるよう継続的に送る
  // (ファイル/モード切替直前の確定保存は Swift 側が別途行う。上記コメント参照)。
  var _mmdScrollDebounceTimer = null;
  function _mmdDebouncedScrollNotify() {
    if (_mmdScrollDebounceTimer !== null) { clearTimeout(_mmdScrollDebounceTimer); }
    _mmdScrollDebounceTimer = setTimeout(function() {
      _mmdScrollDebounceTimer = null;
      _mmdPostScrollPosition();
    }, 200);
  }
  document.addEventListener('scroll', _mmdDebouncedScrollNotify, true);

  // 行番号表示状態を更新する。再描画はしない: Swift 側(ViewerWebView)が
  // 状態変更時に必ず続けて render を送るため、ここで再描画すると全文
  // 再ハイライトが二重に走る。
  function setLineNumbers(show) {
    _showLineNumbers = show;
  }

  // 段階読み込み中(ファイルの一部だけを表示している間)のバナー表示を切り替える。
  function _mmdSetTruncated(isTruncated, lineCount) {
    _mmdIsTruncated = isTruncated;
    // 検索バーが開いていれば「表示範囲内」ラベルの表示/非表示を即座に反映する。
    // (通常は appendChunk 後の _mmdFindRefreshAfterRender が再検索するが、
    // それより先に評価されるため、ここでも件数表示だけ更新しておく)
    if (_mmdFindIsOpenFlag) { _mmdFindUpdateCount(); }
    var banner = document.getElementById('mmd-truncated-banner');
    if (!isTruncated) {
        banner.style.display = 'none';
        return;
    }
    banner.style.display = 'flex';
    var strings = window._mmdBannerStrings || {};
    var textEl = document.getElementById('mmd-truncated-text');
    if (typeof lineCount === 'number') {
        textEl.textContent = (strings.showing || 'Showing {count} lines').replace('{count}', lineCount);
        var btn = document.getElementById('mmd-load-more-btn');
        btn.textContent = strings.loadMore || 'Load More';
        btn.style.display = 'inline-block';
    } else {
        textEl.textContent = strings.showing
            ? strings.showing.replace('{count}', '?')
            : 'Showing partial content';
        document.getElementById('mmd-load-more-btn').style.display = 'none';
    }
  }

  function _mmdLoadMore() {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.loadMoreLines) {
        window.webkit.messageHandlers.loadMoreLines.postMessage({});
    }
  }

  // CSP のため onclick ではなく addEventListener で配線する。
  document.getElementById('mmd-load-more-btn').addEventListener('click', function(e) {
    if (!e.isTrusted) return;
    _mmdLoadMore();
  });

  // 追加読み込みされたチャンクを既存 DOM に追記する(Swift の ViewerBridge から呼ばれる)。
  // HTML 組み立ては viewer.js の純粋関数(csvRowsHtml / buildLineNumberRows /
  // codeChunkInnerHtml)に委ね、ここでは DOM 挿入のみ行う。パス注釈は追記した行だけを
  // _walkTextNodes で処理し、追記コストを O(チャンク) に抑える。
  function appendChunk(text, type, lang) {
    var diagramWrap = document.getElementById('diagram-wrap');
    if (!diagramWrap) { return; }
    // 直前チャンクが改行で終わっている(=行境界で分割された)場合のみ、
    // ブロックコメント等の継続を hljs に再構築させるための前方文脈を取り出す。
    // 強制分割(行途中)の継続は既存の行結合ロジックが別途処理する。
    var highlightContext = (_lastChunkEndedWithNewline && _lastContent)
      ? lastLines(_lastContent, CODE_CHUNK_CONTEXT_LINES) : '';
    if (_lastContent !== null) { _lastContent += text; }
    // CSV は「レンダリング表示(テーブル)」と「ソース表示(レインボー)」で DOM 構造が
    // 異なる(#diagram-wrap 直下が <table><tbody> か <pre><code class="csv-source">
    // か)ため、実際の DOM を見て分岐する。
    var csvSourceEl = type === 'csv' ? diagramWrap.querySelector('pre code.csv-source') : null;
    if (type === 'csv' && !csvSourceEl) {
      var csvRows = parseCsv(text, lang || ',');
      var tbody = diagramWrap.querySelector('tbody');
      if (!tbody) { return; }
      var table = tbody.parentElement;
      var headRow = table.tHead && table.tHead.rows[0];
      var minCols = headRow ? headRow.cells.length : 0;
      // 後続チャンクに幅広行があればヘッダを拡張する。
      var maxNewCols = 0;
      for (var r = 0; r < csvRows.length; r++) {
        if (csvRows[r].length > maxNewCols) { maxNewCols = csvRows[r].length; }
      }
      if (maxNewCols > minCols && headRow) {
        for (var c = minCols; c < maxNewCols; c++) {
          headRow.insertAdjacentHTML('beforeend', '<th></th>');
        }
        minCols = maxNewCols;
      }
      var firstNew = tbody.rows.length;
      tbody.insertAdjacentHTML('beforeend', csvRowsHtml(csvRows, minCols));
      for (var r2 = firstNew; r2 < tbody.rows.length; r2++) {
        _walkTextNodes(tbody.rows[r2], false);
      }
    } else {
      var codeEl = csvSourceEl || diagramWrap.querySelector('pre code');
      if (!codeEl) { return; }
      var inner = csvSourceEl
        ? csvSourceInnerHtml(text, lang || ',')
        : codeChunkInnerHtml(window.hljs, text, lang, highlightContext);
      var codeTable = codeEl.querySelector('table.code-table');
      if (codeTable) {
        // 強制分割(前チャンクが改行で終わらなかった)の場合、継続行は新しい行では
        // なく前チャンク最終行の続きなので、生成した最初の行分を <tr> ごと追加
        // せず既存の最終行セルへ結合する(行番号の重複を防ぐ)。
        var startLine = codeTable.rows.length + (_lastChunkEndedWithNewline ? 1 : 0);
        var rowsHtml = buildLineNumberRows(inner, startLine);
        if (!_lastChunkEndedWithNewline && codeTable.rows.length > 0) {
          var pendingRows = document.createElement('tbody');
          pendingRows.innerHTML = rowsHtml;
          var continuationRow = pendingRows.rows[0];
          if (continuationRow) {
            var lastRow = codeTable.rows[codeTable.rows.length - 1];
            var lastContentCell = lastRow.querySelector('.line-content');
            var continuationContentCell = continuationRow.querySelector('.line-content');
            if (lastContentCell && continuationContentCell) {
              lastContentCell.insertAdjacentHTML('beforeend', continuationContentCell.innerHTML);
            }
            continuationRow.remove();
            rowsHtml = pendingRows.innerHTML;
            _walkTextNodes(lastRow, false);
          }
        }
        var firstNewRow = codeTable.rows.length;
        codeTable.insertAdjacentHTML('beforeend', rowsHtml);
        for (var i = firstNewRow; i < codeTable.rows.length; i++) {
          _walkTextNodes(codeTable.rows[i], false);
        }
      } else {
        codeEl.insertAdjacentHTML('beforeend', inner);
        _annotatePathRefs();
      }
    }
    _lastChunkEndedWithNewline = text.length > 0 && text[text.length - 1] === '\n';
    _mmdFindRefreshAfterRender();
  }
  // PDF 表示用に生成した blob URL。再描画のたびに revoke してリークを防ぐ。
  var _pdfBlobUrl = null;

  // render()/_renderSource() の末尾で検索状態を再描画後の内容に合わせて更新する。
  function _mmdFindRefreshAfterRender() {
    if (_mmdFindIsOpen()) { _mmdFindRefresh(_mmdModeJustSwitched); }
    _mmdModeJustSwitched = false;
  }

  async function render(content, type, lang) {
    // _mmdPendingRestoreScroll が非 null(=Swift 主導のファイル/モード切替)のときだけ
    // 保留中のデバウンス通知を破棄する。無条件に破棄すると、Swift を経由しない内部再描画
    // (カラースキーム変更時など、ファイル/モードは変わらない)で直前のスクロール確定保存が
    // 失われたまま二度と発火しなくなるため。
    if (_mmdPendingRestoreScroll !== null && _mmdScrollDebounceTimer !== null) {
      clearTimeout(_mmdScrollDebounceTimer);
      _mmdScrollDebounceTimer = null;
    }
    // DOM を書き換える前に、内部再描画(カラースキーム変更時など)向けの
    // フォールバック復元位置として現在位置を退避する(_mmdRestoreScrollPosition 参照)。
    var scrollTargetBeforeRender = _mmdScrollTarget();
    var fallbackScrollTop = scrollTargetBeforeRender ? scrollTargetBeforeRender.scrollTop : 0;
    _currentType = type;
    _lastContent = content;
    _lastType = type;
    _lastLang = lang;
    // 初回チャンクも LineChunkReader の強制分割で改行なしのまま渡ることがあるため、
    // appendChunk と同じ判定式で実際の末尾を見る(true 固定だと最初の強制分割で
    // 継続行の結合判定を誤る)。
    _lastChunkEndedWithNewline = content.length > 0 && content[content.length - 1] === '\n';
    var errorPanel = document.getElementById('mmd-error');
    errorPanel.style.display = 'none';
    errorPanel.textContent = '';
    var diagramWrap = document.getElementById('diagram-wrap');
    diagramWrap.style.display = 'block';

    if (_viewMode === 'source' && type !== 'code' && type !== 'image' && type !== 'pdf') {
      _renderSource(content, type, lang);
      _mmdRestoreScrollPosition(fallbackScrollTop);
      return;
    }

    // 分岐前に一括で外し、各分岐は自分のクラスを add するだけにする。
    diagramWrap.classList.remove('markdown-body', 'code-body', 'html-body', 'csv-body', 'image-body', 'pdf-body');

    // 前回の PDF 表示で生成した blob URL を解放する(PDF 以外への切替も含む)。
    if (_pdfBlobUrl) {
      URL.revokeObjectURL(_pdfBlobUrl);
      _pdfBlobUrl = null;
    }

    if (type === 'mmd') {
      diagramWrap.innerHTML = '<pre class="mermaid">' + _escapeHtml(content) + '</pre>';
    } else if (type === 'svg') {
      var svgImg = document.createElement('img');
      svgImg.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(content)));
      svgImg.style.maxWidth = '100%';
      svgImg.alt = 'SVG';
      // mermaid ダイアグラムと同じズーム用ラッパーで包む
      var svgWrap = document.createElement('div');
      svgWrap.className = 'diagram-zoom-wrap';
      svgWrap.dataset.diagramIndex = '0';
      var svgScroll = document.createElement('div');
      svgScroll.className = 'diagram-zoom-scroll';
      var svgInner = document.createElement('div');
      svgInner.className = 'diagram-zoom-inner';
      svgInner.appendChild(svgImg);
      svgScroll.appendChild(svgInner);
      svgWrap.appendChild(svgScroll);
      svgWrap.appendChild(_mmdBuildDiagramControls(svgWrap));
      diagramWrap.innerHTML = '';
      diagramWrap.appendChild(svgWrap);
      svgImg.onload = function() {
        svgWrap.dataset.naturalHeight = svgInner.offsetHeight;
        _mmdApplyDiagramZoom(svgWrap);
      };
    } else if (type === 'html') {
      diagramWrap.classList.add('html-body');
      var iframe = document.createElement('iframe');
      iframe.sandbox = 'allow-same-origin';
      iframe.srcdoc = content;
      iframe.style.width = '100%';
      iframe.style.border = 'none';
      // iframe の高さをコンテンツに合わせる
      iframe.onload = function() {
        try {
          var h = iframe.contentDocument.documentElement.scrollHeight;
          iframe.style.height = h + 'px';
        } catch(e) {
          iframe.style.height = '80vh';
        }
      };
      iframe.style.height = '80vh';
      diagramWrap.innerHTML = '';
      diagramWrap.appendChild(iframe);
    } else if (type === 'csv') {
      // github-markdown-css のテーブル装飾(markdown-body)を土台にしつつ、
      // CSV 専用の上書き(style.css の csv-body)をそこにだけ効かせる。
      // 通常の Markdown テーブルは markdown-body のみを付与するため影響しない。
      diagramWrap.classList.add('markdown-body', 'csv-body');
      var rows = parseCsv(content, lang || ',');
      diagramWrap.innerHTML = buildTableHtml(rows);
    } else if (type === 'image') {
      // 初期表示はウィンドウに収まるサイズ(縦横とも)にフィットさせる。
      // フィット後は #diagram-wrap への全体ズーム(⌘+/-/0、Ctrl+ホイール)が
      // フィット状態を基準に乗算する(imageFitSize のコメント参照)。
      diagramWrap.classList.add('image-body');
      var img = document.createElement('img');
      img.alt = 'Image';
      img.onload = function() {
        _mmdFitImage(img, diagramWrap);
      };
      img.src = 'data:' + (lang || 'image/png') + ';base64,' + content;
      diagramWrap.innerHTML = '';
      diagramWrap.appendChild(img);
    } else if (type === 'pdf') {
      // data: URI ではなく blob: URL を使う。CSP の frame-src は blob: のみを
      // 許可しており、blob URL はこのスクリプトが生成した推測不能なものに
      // 限られるため、Markdown 内に静的に書かれた iframe はロードできない。
      diagramWrap.classList.add('pdf-body');
      var pdfBytes = atob(content);
      var pdfBuf = new Uint8Array(pdfBytes.length);
      for (var bi = 0; bi < pdfBytes.length; bi++) { pdfBuf[bi] = pdfBytes.charCodeAt(bi); }
      _pdfBlobUrl = URL.createObjectURL(new Blob([pdfBuf], { type: 'application/pdf' }));
      var iframe = document.createElement('iframe');
      iframe.src = _pdfBlobUrl;
      diagramWrap.innerHTML = '';
      diagramWrap.appendChild(iframe);
    } else if (type === 'code') {
      // 単一コードファイル。hljs のトークン色は github.css / github-dark.css、
      // レイアウトは style.css の .code-body が担う。
      diagramWrap.classList.add('code-body');
      diagramWrap.innerHTML = renderCodeHtml(window.hljs, content, lang, _showLineNumbers);
    } else {
      // github-markdown-css は .markdown-body プレフィックス前提のため
      // Markdown レンダリング時のみ付与する
      diagramWrap.classList.add('markdown-body');
      if (md) {
        diagramWrap.innerHTML = md.render(content);
      } else {
        diagramWrap.innerHTML = '<p>markdown-it not loaded</p>';
        return;
      }
    }

    var mermaidElements = diagramWrap.querySelectorAll('.mermaid');
    if (mermaidElements.length > 0) {
      mermaidElements.forEach(function(el, i) {
        el.removeAttribute('data-processed');
        el.id = 'mmd-' + i + '-' + Date.now();
      });
      try {
        await mermaid.run({ nodes: Array.from(mermaidElements) });
      } catch(e) {
        // parseError callback handles display
      }
      _mmdWrapDiagrams(diagramWrap);
    }

    _annotatePathRefs();
    _mmdFindRefreshAfterRender();
    _mmdApplyZoom();
    _mmdRestoreScrollPosition(fallbackScrollTop);
  }

  function _renderSource(content, type, lang) {
    var diagramWrap = document.getElementById('diagram-wrap');
    diagramWrap.classList.remove('markdown-body', 'html-body', 'csv-body', 'image-body', 'pdf-body');
    diagramWrap.classList.add('code-body');
    if (type === 'csv') {
      diagramWrap.innerHTML = renderCsvSourceHtml(content, lang || ',', _showLineNumbers);
    } else {
      var sourceLang = (type === 'svg' || type === 'html') ? 'xml'
                     : (type === 'md') ? 'markdown'
                     : lang || 'plaintext';
      diagramWrap.innerHTML = renderCodeHtml(window.hljs, content, sourceLang, _showLineNumbers);
    }
    _mmdFindRefreshAfterRender();
    _mmdApplyZoom();
  }

  // モードを切り替えるだけで再描画はしない: 呼び出し側(Swift)が
  // 常にこの直後に render() を送るため、ここで再描画すると
  // 古い内容による二重描画が発生する。
  function setViewMode(mode) {
    if (mode !== 'rendered' && mode !== 'source') return;
    if (mode !== _viewMode) {
      _mmdModeJustSwitched = true;
    }
    _viewMode = mode;
  }

  _mmdInitZoom();
  _mmdInitFontSize();
  _mmdInitFind();
</script>
</body>
</html>
