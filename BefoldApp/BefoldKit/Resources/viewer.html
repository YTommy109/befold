<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!--
    信頼できない .md / .mmd を開くビューアのため、CSP で外部通信・リモート読み込みを遮断する。
    connect-src 'none' と img-src を自分自身+data: に限定することで、
    レンダリング経路（markdown-it の html:true 等）に XSS が混入しても
    fetch / beacon / 外部画像による情報流出を防ぐ。
    アプリの JS は全て外部ファイル(viewer.js / viewer-main.js 等、同梱の同一オリジン)
    から読み込み、インライン <script> は使わない(onclick 等のインラインイベント
    ハンドラも使わず addEventListener で配線する)ため、script-src に 'unsafe-inline' を
    付与しない。これにより XSS がサニタイザ層をすり抜けて <script> や onerror= 等の
    インラインハンドラを注入しても、CSP がその実行自体をブロックする(多層防御)。
    mermaid が注入するインライン <style> のため style-src には 'unsafe-inline' を付与する。
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; frame-src blob:; connect-src 'none'; base-uri 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>befold</title>
  <!-- ベンダー CSS(github-markdown / github / github-dark)は style.css が
       @import layer(vendor) で取り込む。アプリ側スタイルは無レイヤーのため
       読み込み順や詳細度に関係なく常にベンダーより優先される -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="viewer">
    <div id="mmd-error" class="mmd-error-panel"></div>
    <div id="mmd-truncated-banner" class="mmd-truncated-banner" style="display:none;">
      <span id="mmd-truncated-text"></span>
      <button id="mmd-load-more-btn" style="display:none;"></button>
    </div>
    <div id="diagram-wrap"></div>
  </div>

  <!-- placeholder/title は _mmdInitFind() が window._mmdFindStrings(ローカライズ済み)で
       上書きする。未定義時のフォールバックとして日本語を静的に残す。 -->
  <div id="mmd-find-bar" class="mmd-find-bar">
    <div class="mmd-find-input-wrap">
      <input id="mmd-find-input" type="text" class="mmd-find-input" placeholder="検索">
      <div class="mmd-find-toggles">
        <button id="mmd-find-case" class="mmd-find-toggle" title="大文字・小文字を区別">Aa</button>
        <button id="mmd-find-word" class="mmd-find-toggle" title="単語単位で検索">ab|</button>
        <button id="mmd-find-regex" class="mmd-find-toggle" title="正規表現">.*</button>
      </div>
    </div>
    <span id="mmd-find-count" class="mmd-find-count"></span>
    <button id="mmd-find-prev" class="mmd-find-nav mmd-find-nav-prev" title="前へ (Shift+Enter)">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M1 6.5L5 2.5L9 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="mmd-find-next" class="mmd-find-nav mmd-find-nav-next" title="次へ (Enter)">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M1 3.5L5 7.5L9 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="mmd-find-close" class="mmd-find-close" title="閉じる (Esc)">&times;</button>
  </div>

  <script src="viewer.js"></script>
  <script src="markdown-it.min.js"></script>
  <script src="highlight.min.js"></script>
  <script src="dompurify.min.js"></script>
  <script src="viewer-main.js"></script>
</body>
</html>
