name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    # CI と同じランナー・Xcode に固定し、CI が通ったコミットが
    # リリースだけランナー更新で壊れる事故を防ぐ
    runs-on: macos-26
    permissions:
      contents: write
    env:
      DMG_NAME: befold-${{ github.ref_name }}.dmg
    defaults:
      run:
        working-directory: BefoldApp

    steps:
      - uses: actions/checkout@v4
        with:
          # rev-list --count を正しく数えるため全履歴を取得する
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5'

      - name: xcodegen をインストールする
        run: brew install xcodegen

      - name: Xcode プロジェクトを生成する
        run: xcodegen generate

      - name: 署名用の一時キーチェーンを作成し証明書をインポートする
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.MACOS_CERTIFICATE_PASSPHRASE }}
        run: |
          keychain_path="$RUNNER_TEMP/signing.keychain-db"
          cert_path="$RUNNER_TEMP/certificate.p12"
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$cert_path"

          security create-keychain -p "$KEYCHAIN_PWD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$keychain_path"
          security import "$cert_path" -P "$CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$keychain_path"

          echo "--- diagnostic: imported identities ---"
          security find-identity -v -p codesigning "$keychain_path"
          echo "--- diagnostic: all items ---"
          security dump-keychain "$keychain_path" | grep -E 'class:|labl|agrp' || true
          echo "--- end diagnostic ---"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$keychain_path"
          IFS=$'\n' read -r -d '' -a existing_keychains < <(security list-keychains -d user | sed 's/"//g' && printf '\0')
          security list-keychains -d user -s "$keychain_path" "${existing_keychains[@]}"
          rm "$cert_path"

      - name: .app をビルド・署名する
        # タグからバージョンとビルド番号を注入する。
        # MARKETING_VERSION: dev ビルドが 1.4.10-dev.1 を正しく名乗り、
        #   stable でも project.yml とタグのずれ事故を構造的に防ぐ。
        # CURRENT_PROJECT_VERSION: dev.1 と dev.2 に異なるビルド番号を付ける。
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild build \
            -scheme befold \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            OTHER_CODE_SIGN_FLAGS=--timestamp \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            MARKETING_VERSION="${GITHUB_REF_NAME#v}" \
            CURRENT_PROJECT_VERSION="$(git rev-list --count HEAD)"

      - name: Sparkle framework 内バイナリを再署名する
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          app="build/Build/Products/Release/befold.app"
          sparkle="$app/Contents/Frameworks/Sparkle.framework"
          identity="Developer ID Application"
          sign=(codesign --force --timestamp --sign "$identity" --options runtime)

          # 内側から外側へ順番に署名する
          "${sign[@]}" "$sparkle/Versions/B/XPCServices/Downloader.xpc"
          "${sign[@]}" "$sparkle/Versions/B/XPCServices/Installer.xpc"
          "${sign[@]}" "$sparkle/Versions/B/Updater.app"
          "${sign[@]}" "$sparkle/Versions/B/Autoupdate"
          "${sign[@]}" "$sparkle"

      - name: .app を公証申請する
        env:
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          echo "$NOTARY_API_KEY" > "$key_path"

          ditto -c -k --keepParent "build/Build/Products/Release/befold.app" "$RUNNER_TEMP/befold.zip"
          xcrun notarytool submit "$RUNNER_TEMP/befold.zip" \
            --key "$key_path" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait 2>&1 | tee "$RUNNER_TEMP/notarytool.log"

          rm "$key_path"

          if grep -q 'status: Invalid' "$RUNNER_TEMP/notarytool.log"; then
            submission_id=$(grep '  id:' "$RUNNER_TEMP/notarytool.log" | head -1 | awk '{print $2}')
            echo "::group::Notarization log (submission $submission_id)"
            key_path2="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
            echo "$NOTARY_API_KEY" > "$key_path2"
            xcrun notarytool log "$submission_id" \
              --key "$key_path2" \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER_ID" \
              "$RUNNER_TEMP/notary-log.json" 2>&1 || true
            rm "$key_path2"
            cat "$RUNNER_TEMP/notary-log.json" 2>/dev/null || echo "Failed to retrieve notarization log"
            echo "::endgroup::"
            echo "::error::Notarization failed with status Invalid"
            exit 1
          fi

      - name: 公証チケットを .app にステープルする
        run: |
          for i in 1 2 3; do
            if xcrun stapler staple "build/Build/Products/Release/befold.app"; then
              exit 0
            fi
            echo "stapler attempt $i failed — retrying in 15s…"
            sleep 15
          done
          echo "::error::stapler staple failed after 3 attempts"
          exit 1

      - name: 署名・公証を検証する
        run: |
          codesign --verify --deep --strict --verbose=2 "build/Build/Products/Release/befold.app"
          spctl -a -vvv --type execute "build/Build/Products/Release/befold.app"

      - name: create-dmg をインストールする
        run: brew install create-dmg

      - name: DMG を作成する
        run: ../scripts/create-dmg.sh "build/Build/Products/Release/befold.app" "../$DMG_NAME"

      # 公開前に実際に配布する DMG をマウントして中身を検証する
      # （verify-dmg.yml はダミー app のみ検証するため、本番成果物はここで担保する）
      - name: DMG の内容を検証する
        run: |
          mount_point=$(mktemp -d)
          hdiutil attach "../$DMG_NAME" -nobrowse -readonly -mountpoint "$mount_point"
          trap 'hdiutil detach "$mount_point" -quiet' EXIT
          test -x "$mount_point/befold.app/Contents/MacOS/befold"
          test "$(readlink "$mount_point/Applications")" = "/Applications"

      - name: GitHub Release を作成して DMG を添付する
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Sparkle ツールをインストールする
        run: |
          brew install sparkle
          sparkle_bin="/opt/homebrew/Caskroom/sparkle/$(brew info sparkle --json=v2 | python3 -c 'import sys,json;print(json.load(sys.stdin)["casks"][0]["version"])')/bin"
          echo "$sparkle_bin" >> "$GITHUB_PATH"

      - name: appcast を生成する
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="${GITHUB_REF_NAME}"
          is_prerelease=${{ contains(github.ref_name, '-') }}
          download_url_prefix="https://github.com/YTommy109/befold/releases/download/${tag_name}/"

          # EdDSA 秘密鍵をファイルに書き出す
          key_file="$RUNNER_TEMP/sparkle_eddsa_key"
          echo "$SPARKLE_PRIVATE_KEY" > "$key_file"

          # develop 用 appcast（全リリース含む）
          develop_dir="$RUNNER_TEMP/appcast-develop"
          mkdir -p "$develop_dir"
          gh release download appcast -p "appcast-develop.xml" -D "$develop_dir" 2>/dev/null || true
          cp "../$DMG_NAME" "$develop_dir/"
          generate_appcast --ed-key-file "$key_file" --download-url-prefix "$download_url_prefix" "$develop_dir"
          mv "$develop_dir/appcast-develop.xml" "$RUNNER_TEMP/appcast-develop.xml" 2>/dev/null || mv "$develop_dir/appcast.xml" "$RUNNER_TEMP/appcast-develop.xml"

          # stable 用 appcast（prerelease を除外）
          stable_dir="$RUNNER_TEMP/appcast-stable"
          mkdir -p "$stable_dir"
          gh release download appcast -p "appcast.xml" -D "$stable_dir" 2>/dev/null || true
          if [ "$is_prerelease" = "false" ]; then
            cp "../$DMG_NAME" "$stable_dir/"
            generate_appcast --ed-key-file "$key_file" --download-url-prefix "$download_url_prefix" "$stable_dir"
          fi

          rm "$key_file"
          # stable appcast が存在しない場合（初回 prerelease のみの場合）は空 appcast を作成
          if [ ! -f "$stable_dir/appcast.xml" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle"><channel><title>befold</title></channel></rss>' > "$stable_dir/appcast.xml"
          fi
          mv "$stable_dir/appcast.xml" "$RUNNER_TEMP/appcast.xml"

      - name: appcast を固定リリースにアップロードする
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # appcast リリースが存在しなければ作成
          gh release view appcast 2>/dev/null || gh release create appcast --title "Appcast" --notes "Sparkle appcast files (自動更新)" --latest=false

          # アセットをアップロード（既存があれば上書き）
          gh release upload appcast "$RUNNER_TEMP/appcast.xml" "$RUNNER_TEMP/appcast-develop.xml" --clobber
