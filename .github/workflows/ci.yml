name: CI

on:
  push:
    branches: [main]
    paths:
      - 'BefoldApp/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'BefoldApp/**'
      - '.github/workflows/ci.yml'
  schedule:
    # ThreadSanitizer を毎日回して競合回帰を検出する（push がなくても走らせる）
    - cron: '0 15 * * *'

# 連続 push / force-push で古い実行を打ち切り、macOS ランナー分を節約する
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # PR と main push で走らせる（nightly は TSan のみで十分）
    if: github.event_name != 'schedule'
    runs-on: macos-15
    defaults:
      run:
        working-directory: BefoldApp
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      # SPM のビルド成果物をキャッシュしてコールドビルドを避ける
      - uses: actions/cache@v4
        with:
          path: BefoldApp/.build
          key: spm-${{ runner.os }}-${{ hashFiles('BefoldApp/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: アプリをビルドする（SwiftLint も実行される）
        run: swift build

      - name: SwiftFormat の整形を検証する
        run: swift package plugin --allow-writing-to-package-directory swiftformat -- --lint

      - name: テストを実行する
        run: swift test

  js-test:
    # viewer.js は純粋ロジックのため安価な Ubuntu ランナーで回す
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BefoldApp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: BefoldApp/package-lock.json

      - name: 依存をインストールする
        run: npm ci

      - name: Jest テストを実行する
        run: npx jest

  thread-sanitizer:
    # コストが高いため PR では回さず、main push と nightly に限定する
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: macos-15
    defaults:
      run:
        working-directory: BefoldApp
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      # TSan 計装ビルドは通常ビルドと別成果物のためキャッシュキーを分ける
      - uses: actions/cache@v4
        with:
          path: BefoldApp/.build
          key: spm-tsan-${{ runner.os }}-${{ hashFiles('BefoldApp/Package.resolved') }}
          restore-keys: |
            spm-tsan-${{ runner.os }}-

      # FileWatcher / Debouncer は GCD/DispatchSource でスレッド安全性を保証しており、
      # データ競合の回帰を ThreadSanitizer で検出する。
      - name: ThreadSanitizer 付きでテストを実行する
        run: swift test --sanitize=thread
